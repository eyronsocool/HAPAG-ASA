<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAPAG-ASA - Sign Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #60a5fa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .signup-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            margin: 1rem auto;
        }

        .signup-brand {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .brand-logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .brand-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .brand-tagline {
            font-size: 1rem;
            opacity: 0.9;
            line-height: 1.6;
        }

        .brand-icon {
            font-size: 2.5rem;
            margin-top: 1.5rem;
            opacity: 0.7;
        }

        .signup-form-container {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-title {
            font-size: 1.75rem;
            color: #1e40af;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .form-subtitle {
            color: #6b7280;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-group label {
            display: block;
            color: #374151;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .input-wrapper {
            position: relative;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.9rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: #6b7280;
            transition: color 0.3s;
            padding: 0.5rem;
            line-height: 1;
        }

        .password-toggle:hover {
            color: #1e40af;
        }

        .btn-primary {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            text-align: center;
            margin: 1rem 0;
            color: #9ca3af;
            font-size: 0.875rem;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #e5e7eb;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .login-link {
            text-align: center;
            color: #6b7280;
            font-size: 0.9rem;
        }

        .login-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            display: none;
            background: #fee;
            color: #c33;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            border: 1px solid #fcc;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            display: none;
            background: #efe;
            color: #282;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            border: 1px solid #cfc;
        }

        .success-message.show {
            display: block;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            vertical-align: middle;
            margin-left: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .signup-form-container::-webkit-scrollbar {
            width: 8px;
        }

        .signup-form-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .signup-form-container::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 10px;
        }

        .signup-form-container::-webkit-scrollbar-thumb:hover {
            background: #1e40af;
        }

        /* Tablet styles */
        @media (max-width: 968px) {
            .signup-container {
                grid-template-columns: 1fr;
                max-width: 600px;
            }

            .signup-brand {
                padding: 2rem 1.5rem;
            }

            .brand-logo {
                font-size: 3.5rem;
            }

            .brand-title {
                font-size: 1.75rem;
            }

            .brand-tagline {
                font-size: 0.95rem;
            }

            .brand-icon {
                font-size: 2rem;
                margin-top: 1rem;
            }

            .signup-form-container {
                padding: 2rem 1.5rem;
                max-height: none;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .form-title {
                font-size: 1.5rem;
            }
        }

        /* Mobile styles */
        @media (max-width: 640px) {
            body {
                padding: 0.5rem;
            }

            .signup-container {
                margin: 0.5rem auto;
                border-radius: 15px;
            }

            .signup-brand {
                padding: 1.5rem 1rem;
            }

            .brand-logo {
                font-size: 3rem;
            }

            .brand-title {
                font-size: 1.5rem;
            }

            .brand-tagline {
                font-size: 0.875rem;
            }

            .brand-icon {
                font-size: 1.75rem;
            }

            .signup-form-container {
                padding: 1.5rem 1rem;
            }

            .form-title {
                font-size: 1.35rem;
            }

            .form-subtitle {
                font-size: 0.85rem;
                margin-bottom: 1.25rem;
            }

            .form-group {
                margin-bottom: 0.875rem;
            }

            .form-group label {
                font-size: 0.8rem;
                margin-bottom: 0.4rem;
            }

            .form-group input,
            .form-group select {
                padding: 0.65rem 0.875rem;
                font-size: 0.875rem;
            }

            .btn-primary {
                padding: 0.75rem;
                font-size: 0.95rem;
            }

            .divider {
                font-size: 0.8rem;
                margin: 0.875rem 0;
            }

            .login-link {
                font-size: 0.85rem;
            }
        }

        /* Very small phones */
        @media (max-width: 375px) {
            .form-group input,
            .form-group select {
                padding: 0.6rem 0.75rem;
                font-size: 0.85rem;
            }

            .password-toggle {
                font-size: 1rem;
                padding: 0.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-brand">
            <div class="brand-logo">🍲</div>
            <h1 class="brand-title">HAPAG-ASA</h1>
            <p class="brand-tagline">
                Join us in making a difference in our communities
            </p>
            <div class="brand-icon">🤝</div>
        </div>

        <div class="signup-form-container">
            <h2 class="form-title">Create Account</h2>
            <p class="form-subtitle">Fill in your details to get started</p>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="fullName">Complete Name *</label>
                    <input 
                        type="text" 
                        id="fullName" 
                        placeholder="Enter your full name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="address">Address *</label>
                    <input 
                        type="text" 
                        id="address" 
                        placeholder="Enter your complete address"
                        required
                    >
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input 
                            type="tel" 
                            id="phone" 
                            placeholder="09XX XXX XXXX"
                            pattern="[0-9]{11}"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="gender">Gender *</label>
                        <select id="gender" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Prefer not to say</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="birthdate">Birthdate *</label>
                    <input 
                        type="date" 
                        id="birthdate" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="Create a strong password"
                            minlength="8"
                            required
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword('password')" id="eyeIcon">👁️</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password *</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            placeholder="Confirm your password"
                            minlength="8"
                            required
                        >
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')" id="eyeIconConfirm">👁️</button>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">Create Account</button>
            </form>

            <div class="divider">OR</div>

            <div class="login-link">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAraqQhEWlLxUP_XTOTZlgN7CAQOkuZbp8",
            authDomain: "hapag-asa.firebaseapp.com",
            projectId: "hapag-asa",
            storageBucket: "hapag-asa.firebasestorage.app",
            messagingSenderId: "533177839171",
            appId: "1:533177839171:web:4cd74f4949f2449b09eef6",
            measurementId: "G-GN23CK2SPX"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const passwordStates = {
            password: false,
            confirmPassword: false
        };

        function togglePassword(fieldId) {
            const passwordInput = document.getElementById(fieldId);
            const eyeIcon = document.getElementById(fieldId === 'password' ? 'eyeIcon' : 'eyeIconConfirm');
            
            passwordStates[fieldId] = !passwordStates[fieldId];
            
            if (passwordStates[fieldId]) {
                passwordInput.type = 'text';
                eyeIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = '👁️';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            document.getElementById('successMessage').classList.remove('show');
            
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
            document.getElementById('errorMessage').classList.remove('show');
            
            setTimeout(() => {
                successDiv.classList.remove('show');
            }, 5000);
        }

        async function handleSignup(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const originalBtnText = submitBtn.innerHTML;
            
            const formData = {
                fullName: document.getElementById('fullName').value.trim(),
                address: document.getElementById('address').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                gender: document.getElementById('gender').value,
                birthdate: document.getElementById('birthdate').value,
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value
            };
            
            // Validate phone number format
            const phonePattern = /^[0-9]{11}$/;
            if (!phonePattern.test(formData.phone)) {
                showError('Please enter a valid 11-digit phone number');
                return;
            }
            
            // Validate age (must be at least 13 years old)
            const birthdate = new Date(formData.birthdate);
            const today = new Date();
            let age = today.getFullYear() - birthdate.getFullYear();
            const monthDiff = today.getMonth() - birthdate.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthdate.getDate())) {
                age--;
            }
            if (age < 13) {
                showError('You must be at least 13 years old to sign up');
                return;
            }
            
            // Validate password match
            if (formData.password !== formData.confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            // Validate password strength
            if (formData.password.length < 8) {
                showError('Password must be at least 8 characters long');
                return;
            }
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Creating Account<span class="loading"></span>';
            
            try {
                // Create user with Firebase Authentication
                const userCredential = await auth.createUserWithEmailAndPassword(
                    formData.email,
                    formData.password
                );
                
                const user = userCredential.user;
                
                // Store additional user data in Firestore
                await db.collection('users').doc(user.uid).set({
                    fullName: formData.fullName,
                    address: formData.address,
                    phone: formData.phone,
                    gender: formData.gender,
                    birthdate: formData.birthdate,
                    email: formData.email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    role: 'user'
                });
                
                showSuccess('Account created successfully! Redirecting...');
                
                // Redirect to login or dashboard after 2 seconds
                setTimeout(() => {
                    window.location.href = 'login.html'; // or 'dashboard.html'
                }, 2000);
                
            } catch (error) {
                console.error('Signup error:', error);
                
                let errorMessage = 'An error occurred during signup. Please try again.';
                
                switch (error.code) {
                    case 'auth/email-already-in-use':
                        errorMessage = 'This email is already registered. Please login instead.';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = 'Invalid email address format.';
                        break;
                    case 'auth/weak-password':
                        errorMessage = 'Password is too weak. Please use a stronger password.';
                        break;
                    case 'auth/network-request-failed':
                        errorMessage = 'Network error. Please check your internet connection.';
                        break;
                }
                
                showError(errorMessage);
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
            }
        }

        // Prevent form submission on Enter key for inputs (except submit button)
        document.querySelectorAll('input, select').forEach(element => {
            element.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const form = document.getElementById('signupForm');
                    const nextInput = Array.from(form.elements).find((el, idx) => {
                        return idx > Array.from(form.elements).indexOf(e.target) && 
                               (el.tagName === 'INPUT' || el.tagName === 'SELECT') && 
                               !el.disabled;
                    });
                    if (nextInput) {
                        nextInput.focus();
                    }
                }
            });
        });
    </script>
</body>
</html>
